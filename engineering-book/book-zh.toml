[book]
title = "Rust Engineering Practices — Beyond cargo build | Rust 工程实践：超越 cargo build"
authors = ["Rust Training Team"]
language = "zh-CN"
src = "zh"

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/zcg/RustTraining"
default-theme = "light"
preferred-dark-theme = "ayu"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = true
line-numbers = true
